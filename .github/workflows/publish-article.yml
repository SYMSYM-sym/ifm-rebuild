name: Publish Article

on:
  # Fires on Mon + Thu at 9:23 AM Pacific (off-peak minute to avoid GH cron congestion).
  # Note: workflow file must be committed via verified commit for schedule to fire.
  schedule:
    - cron: '23 16 * * 1,4'
    - cron: '23 17 * * 1,4'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Optional: force a specific topic slug'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          FORCE_SLUG: ${{ github.event.inputs != null && github.event.inputs.slug || '' }}
        run: node scripts/index.mjs

      - name: Detect changes
        id: git_status
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.git_status.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'blog: ${{ env.ARTICLE_TITLE }}'
          title: 'blog: ${{ env.ARTICLE_TITLE }}'
          body: |
            Auto-generated article. Will auto-merge in 24 hours unless the `hold` label is added.

            - Slug: ${{ env.ARTICLE_SLUG }}
            - Target keyword: ${{ env.ARTICLE_KEYWORD }}
            - Bucket: ${{ env.ARTICLE_BUCKET }}
            - Word count: ${{ env.ARTICLE_WORDS }}
          branch: auto/article-${{ env.ARTICLE_SLUG }}
          labels: auto-article